<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warp Speed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }
  #hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(140, 170, 255, 0.32);
    font: 11px/1 'Courier New', monospace;
    letter-spacing: 5px;
    text-transform: uppercase;
    pointer-events: none;
    user-select: none;
    transition: opacity 2.5s ease;
    white-space: nowrap;
  }
  #stat {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #stat .label {
    color: rgba(140, 180, 255, 0.75);
    font: 10px/1 'Courier New', monospace;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  #stat .value {
    color: #fff;
    font: bold 22px/1.4 'Courier New', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow:
      0 0 8px rgba(140, 200, 255, 1),
      0 0 20px rgba(100, 160, 255, 0.9),
      0 0 45px rgba(70, 120, 240, 0.6),
      0 0 90px rgba(50, 90, 200, 0.3);
  }
  #stat .sub {
    display: block;
    font-size: 13px;
    font-weight: normal;
    letter-spacing: 3px;
    margin-top: 4px;
    opacity: 0.65;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">— HOLD SPACE TO ENGAGE WARP —</div>
<div id="stat"></div>
<script>
'use strict';

// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('hint');

let W, H, cx, cy, maxR;
function resize() {
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
  cx = W / 2; cy = H / 2;
  maxR = Math.hypot(cx, cy) * 1.12;
}
window.addEventListener('resize', () => { resize(); initStars(); });
resize();

// ─── Stars ────────────────────────────────────────────────────────────────────
const NUM_STARS = 430;
let stars = [];

function mkStar() {
  const angle = Math.random() * Math.PI * 2;
  // Bias distribution outward — more stars near edges for parallax density
  const homeR = maxR * (0.03 + Math.pow(Math.random(), 0.52) * 0.97);
  return {
    angle,
    homeR,         // permanent resting position
    r: homeR,      // live position during warp
    sz:      0.35 + Math.random() * 2.0,
    bright:  0.40 + Math.random() * 0.60,
    twPhase: Math.random() * Math.PI * 2,
    twSpeed: 0.50 + Math.random() * 2.20,
    blue:    Math.random() < 0.22,
  };
}

function initStars() {
  stars = Array.from({ length: NUM_STARS }, mkStar);
}
initStars();

// ─── Warp State ───────────────────────────────────────────────────────────────
let warpIntensity = 0;   // 0 → 1, builds gradually
let warpTime      = 0;   // seconds of active warp (for easter egg timer)
let prevTs        = performance.now();
const WARP_BUILD  = 3.0; // seconds to reach full warp

// ─── Audio ────────────────────────────────────────────────────────────────────
let audio = null;

function initAudio() {
  if (audio) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  const ac = new AC();
  audio = { ac };

  const master = ac.createGain();
  master.gain.value = 0.85;
  master.connect(ac.destination);
  audio.master = master;

  // ── Ambient space hum ──
  const ambGain = ac.createGain();
  ambGain.gain.value = 0.065;
  ambGain.connect(master);
  audio.ambGain = ambGain;

  const humFreqs = [50, 75, 100];
  audio.hums = humFreqs.map((f, i) => {
    const o = ac.createOscillator();
    o.type = 'sine';
    o.frequency.value = f;
    const g = ac.createGain();
    g.gain.value = [1, 0.45, 0.18][i];
    o.connect(g); g.connect(ambGain);
    o.start(); return o;
  });

  // Slow LFO wobble on the base hum
  const lfo = ac.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.11;
  const lfoG = ac.createGain(); lfoG.gain.value = 2.8;
  lfo.connect(lfoG); lfoG.connect(audio.hums[0].frequency);
  lfo.start(); audio.lfo = lfo;

  // ── Warp engine ──
  const warpGain = ac.createGain();
  warpGain.gain.value = 0;
  audio.warpGain = warpGain;

  const wFilter = ac.createBiquadFilter();
  wFilter.type = 'lowpass';
  wFilter.frequency.value = 400;
  wFilter.Q.value = 3.5;
  wFilter.connect(warpGain);
  warpGain.connect(master);
  audio.warpFilter = wFilter;

  const warpDefs = [
    { f: 55,   type: 'sawtooth', vol: 0.60 },
    { f: 82.5, type: 'square',   vol: 0.32 },
    { f: 110,  type: 'sine',     vol: 0.20 },
  ];
  audio.warpOscs = warpDefs.map(({ f, type, vol }) => {
    const o = ac.createOscillator();
    o.type = type; o.frequency.value = f;
    const g = ac.createGain(); g.gain.value = vol;
    o.connect(g); g.connect(wFilter);
    o.start(); return o;
  });

  // Deep sub rumble
  const subO = ac.createOscillator();
  subO.type = 'sine'; subO.frequency.value = 28;
  const subG = ac.createGain(); subG.gain.value = 0;
  subO.connect(subG); subG.connect(master);
  subO.start();
  audio.subOsc = subO; audio.subGain = subG;
}

function updateAudio(wi) {
  if (!audio) return;
  const ac = audio.ac;
  const t  = ac.currentTime;
  const tc = 0.055;

  audio.ambGain.gain.setTargetAtTime(0.065 + wi * 0.13, t, tc);
  audio.hums.forEach((o, i) => {
    const base = [50, 75, 100][i];
    o.frequency.setTargetAtTime(base * (1 + wi * 0.55), t, 0.12);
  });
  audio.lfo.frequency.setTargetAtTime(0.11 + wi * 4.5, t, 0.1);

  const dropTc = wi > 0 ? 0.08 : 0.025; // fast release when warp cut
  audio.warpGain.gain.setTargetAtTime(wi * 0.48, t, dropTc);
  audio.warpFilter.frequency.setTargetAtTime(350 + wi * 950, t, 0.12);
  audio.warpOscs.forEach((o, i) => {
    const base = [55, 82.5, 110][i];
    o.frequency.setTargetAtTime(base * (1 + wi * 2.2), t, 0.18);
  });

  audio.subGain.gain.setTargetAtTime(wi * wi * 0.28, t, 0.09);
  audio.subOsc.frequency.setTargetAtTime(28 + wi * 24, t, 0.12);
}

// ─── Easter Eggs ─────────────────────────────────────────────────────────────
let egg       = null;
let nextEggIn = 4 + Math.random() * 3;  // first egg at 4–7 seconds of warp

// Cycle through types so you see variety — no comet (visual only, planet/station/alien)
const EGG_TYPES = ['planet', 'station', 'alien'];
let lastEggType = '';

function spawnEgg() {
  // Avoid repeating the same type twice in a row
  let choices = EGG_TYPES.filter(t => t !== lastEggType);
  const type  = choices[Math.floor(Math.random() * choices.length)];
  lastEggType  = type;

  const fromLeft = Math.random() < 0.5;
  // Large enough to clearly notice
  const size     = 100 + Math.random() * 60;
  // Slow enough to appreciate — about 3–5 seconds to cross screen at warp
  const spd      = (2.5 + Math.random() * 1.5) * (fromLeft ? 1 : -1);

  egg = {
    type,
    x:         fromLeft ? -size - 30 : W + size + 30,
    y:         H * (0.2 + Math.random() * 0.60),
    vx:        spd,
    size,
    opacity:   0,          // fade IN so it feels like it materialises
    lingering: false,
    rot:       Math.random() * Math.PI * 2,
    rotSpeed:  (Math.random() - 0.5) * 0.015,
    hue:       Math.floor(Math.random() * 360),
    driftVy:   (Math.random() - 0.5) * 0.4,
  };
}

function eggOnScreen() {
  if (!egg) return false;
  return egg.x > -egg.size && egg.x < W + egg.size;
}

function updateEgg(dt) {
  if (!egg) return;
  egg.rot += egg.rotSpeed;

  if (egg.lingering) {
    // Very slow peaceful drift + gentle fade over ~6 seconds
    const sign = egg.vx >= 0 ? 1 : -1;
    egg.x += sign * 28 * dt;
    egg.y += egg.driftVy * 12 * dt;
    egg.opacity = Math.max(0, egg.opacity - dt * 0.16);
    if (egg.opacity <= 0) egg = null;
  } else {
    // Fade in quickly when first appearing
    egg.opacity = Math.min(1, egg.opacity + dt * 2.5);
    // Move at warp pace — vx is px/s at base scale
    egg.x += egg.vx * dt * 60;
    // Fully off screen → remove
    if (egg.x < -egg.size * 3 || egg.x > W + egg.size * 3) egg = null;
  }
}

// ─── Drawing: Easter Egg Objects ─────────────────────────────────────────────

function drawPlanet(ex, ey, r, hue, op, rot) {
  ctx.save();
  ctx.globalAlpha = op;
  ctx.translate(ex, ey);
  ctx.rotate(rot);

  // Atmosphere outer glow
  const atmG = ctx.createRadialGradient(0, 0, r * 0.85, 0, 0, r * 1.55);
  atmG.addColorStop(0, `hsla(${hue}, 75%, 65%, 0.22)`);
  atmG.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(0, 0, r * 1.55, 0, Math.PI * 2);
  ctx.fillStyle = atmG; ctx.fill();

  // Planet body
  const bodyG = ctx.createRadialGradient(-r * 0.28, -r * 0.28, r * 0.05, 0, 0, r);
  bodyG.addColorStop(0,   `hsl(${hue}, 60%, 84%)`);
  bodyG.addColorStop(0.4, `hsl(${hue}, 55%, 50%)`);
  bodyG.addColorStop(1,   `hsl(${hue}, 45%, 16%)`);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = bodyG; ctx.fill();

  // Cloud/band lines clipped to sphere
  ctx.save(); ctx.clip();
  const bandHue = (hue + 25) % 360;
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.ellipse(0, i * r * 0.31, r, r * 0.10, 0, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${bandHue}, 45%, ${i % 2 === 0 ? 38 : 58}%, 0.22)`;
    ctx.fill();
  }
  // Polar ice cap
  ctx.beginPath();
  ctx.ellipse(0, -r * 0.78, r * 0.6, r * 0.28, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220, 240, 255, 0.25)';
  ctx.fill();
  ctx.restore();

  // Rings (only for cooler hues — blues/purples/greens)
  if (hue % 360 < 210) {
    ctx.save(); ctx.scale(1, 0.27);
    [
      { rf: 1.82, lw: 0.24, a: 0.42 },
      { rf: 1.48, lw: 0.15, a: 0.28 },
      { rf: 1.22, lw: 0.08, a: 0.15 },
    ].forEach(({ rf, lw, a }) => {
      ctx.beginPath(); ctx.arc(0, 0, r * rf, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${(hue + 35) % 360}, 55%, 68%, ${a})`;
      ctx.lineWidth = r * lw; ctx.stroke();
    });
    ctx.restore();
  }

  // Specular highlight
  const specG = ctx.createRadialGradient(-r * 0.32, -r * 0.32, 0, -r * 0.1, -r * 0.1, r * 0.7);
  specG.addColorStop(0, 'rgba(255, 255, 255, 0.18)');
  specG.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = specG; ctx.fill();

  ctx.restore();
}

function drawStation(ex, ey, r, op, rot) {
  ctx.save();
  ctx.globalAlpha = op;
  ctx.translate(ex, ey);
  ctx.rotate(rot);

  // Station glow
  const glowG = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 1.4);
  glowG.addColorStop(0, 'rgba(70, 130, 255, 0.18)');
  glowG.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2);
  ctx.fillStyle = glowG; ctx.fill();

  // Outer habitat ring (ellipse for 3D feel)
  ctx.save(); ctx.scale(1, 0.36);
  ctx.beginPath(); ctx.arc(0, 0, r * 0.78, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(90, 155, 255, 0.75)';
  ctx.lineWidth = 6; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, r * 0.66, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(55, 110, 210, 0.38)';
  ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();

  // Central hub
  const hubG = ctx.createRadialGradient(-r * 0.1, -r * 0.1, 0, 0, 0, r * 0.34);
  hubG.addColorStop(0, '#7aadd8');
  hubG.addColorStop(1, '#1c3252');
  ctx.beginPath(); ctx.arc(0, 0, r * 0.34, 0, Math.PI * 2);
  ctx.fillStyle = hubG; ctx.fill();
  ctx.strokeStyle = '#4d8cc4'; ctx.lineWidth = 2; ctx.stroke();

  // 4 arms + solar panels
  for (let i = 0; i < 4; i++) {
    const a  = (i / 4) * Math.PI * 2;
    const ax = Math.cos(a) * r * 0.82;
    const ay = Math.sin(a) * r * 0.82;
    // Arm strut
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 0.34, Math.sin(a) * r * 0.34);
    ctx.lineTo(ax, ay);
    ctx.strokeStyle = '#5888b2'; ctx.lineWidth = 3.5; ctx.stroke();
    // Panel block
    ctx.save(); ctx.translate(ax, ay); ctx.rotate(a + Math.PI / 2);
    const pw = r * 0.46, ph = r * 0.18;
    ctx.fillStyle   = '#192e50';
    ctx.strokeStyle = '#3d88d4';
    ctx.lineWidth   = 1.2;
    ctx.fillRect(-pw / 2, -ph / 2, pw, ph);
    ctx.strokeRect(-pw / 2, -ph / 2, pw, ph);
    // Cell grid
    ctx.strokeStyle = 'rgba(70, 155, 240, 0.35)';
    ctx.lineWidth   = 0.8;
    for (let j = 1; j < 3; j++) {
      ctx.beginPath();
      ctx.moveTo(-pw / 2 + j * pw / 3, -ph / 2);
      ctx.lineTo(-pw / 2 + j * pw / 3,  ph / 2);
      ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(-pw / 2, 0); ctx.lineTo(pw / 2, 0); ctx.stroke();
    ctx.restore();
  }

  // Blinking navigation lights
  const blink = Math.sin(Date.now() * 0.0028) > 0;
  ctx.beginPath(); ctx.arc(r * 0.36, 0, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = blink ? '#ff3c3c' : '#330000'; ctx.fill();
  ctx.beginPath(); ctx.arc(-r * 0.36, 0, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = blink ? '#220000' : '#3cff88'; ctx.fill();

  // Small docking port
  ctx.beginPath(); ctx.arc(0, r * 0.34, r * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = '#0e1e30'; ctx.fill();
  ctx.strokeStyle = '#4a7aaa'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.restore();
}

function drawAlien(ex, ey, r, op, rot) {
  ctx.save();
  ctx.globalAlpha = op;
  ctx.translate(ex, ey);
  ctx.rotate(rot);

  // Plasma engine glow below disc
  const engG = ctx.createRadialGradient(0, r * 0.22, 0, 0, r * 0.22, r * 0.75);
  engG.addColorStop(0, 'rgba(70, 255, 120, 0.50)');
  engG.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.ellipse(0, r * 0.18, r * 0.72, r * 0.32, 0, 0, Math.PI * 2);
  ctx.fillStyle = engG; ctx.fill();

  // Main saucer disc (squashed)
  ctx.save(); ctx.scale(1, 0.40);
  const discG = ctx.createRadialGradient(0, -r * 0.3, r * 0.05, 0, 0, r);
  discG.addColorStop(0,   '#96eaa8');
  discG.addColorStop(0.45, '#248a48');
  discG.addColorStop(1,    '#0a2816');
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = discG; ctx.fill();
  ctx.strokeStyle = '#40cc68'; ctx.lineWidth = 2.5; ctx.stroke();
  // Underside detail ring
  ctx.beginPath(); ctx.arc(0, 0, r * 0.7, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(60, 200, 90, 0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  // Glass dome
  ctx.save(); ctx.scale(1, 0.82);
  const domeG = ctx.createRadialGradient(-r * 0.14, -r * 0.24, 0, 0, 0, r * 0.44);
  domeG.addColorStop(0,   'rgba(215, 255, 248, 0.95)');
  domeG.addColorStop(0.38, 'rgba(95, 215, 235, 0.70)');
  domeG.addColorStop(1,    'rgba(0, 88, 108, 0.48)');
  ctx.beginPath(); ctx.arc(0, 0, r * 0.44, 0, Math.PI * 2);
  ctx.fillStyle = domeG; ctx.fill();
  ctx.restore();

  // Pulsing rim lights
  const pulse = Date.now() * 0.0042;
  for (let i = 0; i < 9; i++) {
    const a = (i / 9) * Math.PI * 2;
    const p = 0.35 + 0.65 * Math.sin(pulse + i * 0.72);
    ctx.beginPath();
    ctx.arc(Math.cos(a) * r * 0.80, Math.sin(a) * r * 0.17, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(75, 255, 145, ${p * 0.92})`;
    ctx.fill();
  }

  ctx.restore();
}

function drawEgg() {
  if (!egg || egg.opacity <= 0) return;
  const { type, x, y, size, opacity, rot, hue } = egg;
  switch (type) {
    case 'planet':  drawPlanet(x, y, size,  hue, opacity, rot); break;
    case 'station': drawStation(x, y, size,      opacity, rot); break;
    case 'alien':   drawAlien(x, y, size,        opacity, rot); break;
  }
}

// ─── Distance Stat ────────────────────────────────────────────────────────────
const statEl = document.getElementById('stat');
let statTimer = null;
let sessionWarpSecs = 0;  // duration of the current/last spacebar hold

const STAT_TEMPLATES = [
  s => ({ main: `${(s * 0.14).toFixed(2)} KESSEL RUNS`,       sub: 'COMPLETED' }),
  s => ({ main: `${Math.floor(s * 220)} PARSECS`,              sub: 'BEYOND THE OUTER RIM' }),
  s => ({ main: `${(s * 9.5).toFixed(1)} LIGHT YEARS`,         sub: 'FROM THE MILLENNIUM FALCON' }),
  s => ({ main: `${Math.floor(s * 4 + 1)} STAR SYSTEMS`,       sub: 'JUMPED IN ONE PARSEC' }),
  s => ({ main: `${(s * 0.07).toFixed(3)} GALAXIES`,           sub: 'CROSSED AT LIGHTSPEED' }),
  s => ({ main: `${(s * 0.06).toFixed(2)} PARSECS`,            sub: 'TO ALDERAAN (RIP)' }),
  s => ({ main: `${Math.floor(s * 12)} MIDI-CHLORIANS`,        sub: 'DETECTED IN THE FORCE STREAM' }),
  s => ({ main: `${(s * 1.21).toFixed(2)} GIGAWATTS`,          sub: 'OF HYPERDRIVE ENERGY CONSUMED' }),
];

function showDistanceStat(secs) {
  if (secs < 0.8) return;  // don't bother for tiny taps
  if (statTimer) clearTimeout(statTimer);

  const tmpl  = STAT_TEMPLATES[Math.floor(Math.random() * STAT_TEMPLATES.length)];
  const { main, sub } = tmpl(secs);

  statEl.innerHTML = `
    <div class="label">— WARP DISENGAGED —</div>
    <div class="value">${main}<span class="sub">${sub}</span></div>`;
  statEl.style.transition = 'opacity 0.5s ease';
  statEl.style.opacity    = '1';

  statTimer = setTimeout(() => {
    statEl.style.transition = 'opacity 1.2s ease';
    statEl.style.opacity    = '0';
  }, 2800);
}

// ─── Input ────────────────────────────────────────────────────────────────────
let spaceDown  = false;
let hintHidden = false;

function onDown() {
  if (!spaceDown) {
    spaceDown        = true;
    sessionWarpSecs  = 0;
    initAudio();
    if (!hintHidden) {
      hint.style.opacity = '0';
      hintHidden = true;
    }
  }
}

function onUp() {
  if (!spaceDown) return;
  spaceDown = false;
  // Show distance stat
  showDistanceStat(sessionWarpSecs);
  // If an egg is on screen, let it linger dramatically
  if (egg && eggOnScreen() && !egg.lingering) {
    egg.lingering = true;
  }
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); onDown(); }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') onUp();
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp();   }, { passive: false });

// ─── Main Loop ────────────────────────────────────────────────────────────────
function frame(ts) {
  requestAnimationFrame(frame);
  const dt = Math.min((ts - prevTs) / 1000, 0.05);
  prevTs = ts;

  // ── Warp intensity ──
  if (spaceDown) {
    warpIntensity    = Math.min(1, warpIntensity + dt / WARP_BUILD);
    warpTime        += dt;
    sessionWarpSecs += dt;
  } else {
    if (warpIntensity > 0) {
      // Instant snap-back
      warpIntensity = 0;
      warpTime      = 0;
      nextEggIn     = 4 + Math.random() * 3;  // reset for next warp session
      // Stars snap home
      stars.forEach(s => { s.r = s.homeR; });
    }
  }

  // ── Easter egg timing — count down from first frame of warp ──
  if (spaceDown) {
    nextEggIn -= dt;
    if (nextEggIn <= 0 && !egg) {
      spawnEgg();
      nextEggIn = 5 + Math.random() * 3;  // next egg in 5–8 seconds
    }
  }
  updateEgg(dt);

  // ── Audio ──
  updateAudio(warpIntensity);

  // ── Star positions (warp mode only) ──
  if (warpIntensity > 0) {
    const wi2 = warpIntensity * warpIntensity;
    stars.forEach(s => {
      const nR    = Math.max(0.01, s.r / maxR);
      const speed = wi2 * (0.055 + nR * 1.45) * maxR * dt;
      s.r += speed;
      if (s.r >= maxR) {
        // Recycle: new random angle, start near center
        s.angle = Math.random() * Math.PI * 2;
        s.r     = maxR * (0.005 + Math.random() * 0.038);
        // homeR stays unchanged so snap-back goes to original slot
      }
    });
  }

  // ── Clear ──
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // ── Draw star field ──
  const t = ts / 1000;
  if (warpIntensity === 0) {
    drawNormal(t);
  } else {
    drawWarp();
  }

  // ── Warp center glow ──
  if (warpIntensity > 0.05) {
    const wi    = warpIntensity;
    const glR   = 70 + wi * 280;
    const glowG = ctx.createRadialGradient(cx, cy, 0, cx, cy, glR);
    glowG.addColorStop(0,   `rgba(115, 155, 255, ${wi * 0.20})`);
    glowG.addColorStop(0.45, `rgba(75,  110, 230, ${wi * 0.08})`);
    glowG.addColorStop(1,    'transparent');
    ctx.fillStyle = glowG;
    ctx.fillRect(0, 0, W, H);
  }

  // ── Vignette during warp ──
  if (warpIntensity > 0.25) {
    const vR  = Math.max(W, H) * 0.85;
    const vig = ctx.createRadialGradient(cx, cy, vR * 0.28, cx, cy, vR);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, `rgba(0, 0, 8, ${warpIntensity * 0.55})`);
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);
  }

  // ── Easter egg ──
  drawEgg();
}

// ─── Render: Normal Star Field ────────────────────────────────────────────────
function drawNormal(t) {
  stars.forEach(s => {
    const x  = cx + Math.cos(s.angle) * s.homeR;
    const y  = cy + Math.sin(s.angle) * s.homeR;
    const tw = 0.55 + 0.45 * Math.sin(t * s.twSpeed + s.twPhase);
    const a  = s.bright * tw;
    const sz = s.sz * (0.82 + 0.32 * tw);

    ctx.beginPath(); ctx.arc(x, y, sz, 0, Math.PI * 2);
    ctx.fillStyle = s.blue
      ? `rgba(178, 208, 255, ${a})`
      : `rgba(255, 255, 255, ${a})`;
    ctx.fill();

    // Occasional cross-sparkle on bright stars
    if (s.sz > 1.8 && tw > 0.85) {
      const sp = sz * 2.2;
      ctx.strokeStyle = s.blue
        ? `rgba(178, 208, 255, ${a * 0.45})`
        : `rgba(255, 255, 255, ${a * 0.45})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(x - sp, y); ctx.lineTo(x + sp, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y - sp); ctx.lineTo(x, y + sp); ctx.stroke();
    }
  });
}

// ─── Render: Warp Streaks ─────────────────────────────────────────────────────
function drawWarp() {
  const wi  = warpIntensity;
  const wi2 = wi * wi;

  ctx.save();
  ctx.lineCap = 'round';

  stars.forEach(s => {
    const nR      = Math.max(0.01, s.r / maxR);
    // Per-frame speed for streak-length estimation (at ~60fps)
    const spd     = wi2 * (0.055 + nR * 1.45) * maxR / 60;
    const tailLen = Math.min(s.r * 0.96, spd * 11 + wi2 * nR * maxR * 0.11);

    const rHead = s.r;
    const rTail = Math.max(0.5, rHead - tailLen);

    const hx = cx + Math.cos(s.angle) * rHead;
    const hy = cy + Math.sin(s.angle) * rHead;
    const tx = cx + Math.cos(s.angle) * rTail;
    const ty = cy + Math.sin(s.angle) * rTail;

    const alpha = Math.min(1, (0.18 + wi * 0.82) * s.bright);

    if (tailLen < 1.2) {
      // Just a faint dot — star barely moving yet
      ctx.beginPath(); ctx.arc(hx, hy, s.sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(215, 230, 255, ${alpha * 0.85})`;
      ctx.fill();
      return;
    }

    // Gradient streak: transparent at tail → bright at head
    const grad = ctx.createLinearGradient(tx, ty, hx, hy);
    if (s.blue) {
      grad.addColorStop(0,   `rgba(135, 192, 255, 0)`);
      grad.addColorStop(0.55, `rgba(175, 218, 255, ${alpha * 0.48})`);
      grad.addColorStop(1,   `rgba(220, 238, 255, ${alpha})`);
    } else {
      grad.addColorStop(0,   `rgba(195, 210, 255, 0)`);
      grad.addColorStop(0.55, `rgba(232, 238, 255, ${alpha * 0.50})`);
      grad.addColorStop(1,   `rgba(255, 255, 255, ${alpha})`);
    }

    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(hx, hy);
    ctx.strokeStyle = grad;
    ctx.lineWidth   = Math.max(0.35, s.sz * (0.38 + wi * 0.72));
    ctx.stroke();

    // Bright tip dot
    ctx.beginPath(); ctx.arc(hx, hy, s.sz * 0.65 * wi + 0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.88})`;
    ctx.fill();
  });

  ctx.restore();
}

// ── Go ──
requestAnimationFrame(frame);
</script>
